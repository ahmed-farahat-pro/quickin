name: QuickIn
options:
  bundleIdPrefix: com.quickin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  QuickIn:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: QuickIn
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Allow plain-HTTP calls to the local Supabase during development
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.quickin.app
