name: QuickIn
options:
  bundleIdPrefix: com.quickin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  # Google Maps iOS SDK (Swift Package Manager). Used by the Explore map and the
  # host add-listing pin-picker. The package resolves a large binary on first
  # build, so the initial `xcodebuild` can take a few minutes.
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    from: "9.0.0"
  # Firebase iOS SDK (Swift Package Manager). We only pull in FirebaseMessaging
  # (Cloud Messaging) so the app can register its FCM token with the backend,
  # which sends push via FCM HTTP v1. Like GoogleMaps this resolves a large
  # dependency graph on first build, so the initial `xcodebuild` can take a few
  # minutes. Pinned to the 11.x line.
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.6.0"
targets:
  QuickIn:
    type: application
    platform: iOS
    sources:
      - Sources
      # Bundle the Firebase config into the app so `FirebaseApp.configure()`
      # finds it at runtime. It lives at the project root (one level up from
      # Sources); xcodegen copies it into the .app bundle's Resources.
      - path: GoogleService-Info.plist
        buildPhase: resources
    dependencies:
      - package: GoogleMaps
        product: GoogleMaps
      # Cloud Messaging (push). Registers the FCM token with the backend.
      - package: Firebase
        product: FirebaseMessaging
    # Associated Domains + Sign in with Apple + push. Declared here so xcodegen
    # regenerates QuickIn.entitlements with the Universal Links domain on every
    # `xcodegen generate` (the file is otherwise hand-maintained). The path
    # matches CODE_SIGN_ENTITLEMENTS in `settings.base` below.
    entitlements:
      path: QuickIn.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
        # Universal Links: lets a shared https://quickin-frontend.vercel.app/…
        # link open the app instead of Safari (requires the matching AASA file
        # hosted on that domain). See ShareLinks.swift / DeepLinkRouter.swift.
        com.apple.developer.associated-domains:
          - applinks:quickin-frontend.vercel.app
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: QuickIn
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Custom URL scheme `quickin://` — a no-server-config deep-link fallback
        # (e.g. quickin://explore/<id>) that works even without the AASA file.
        CFBundleURLTypes:
          - CFBundleURLName: com.quickin.ahmed
            CFBundleURLSchemes:
              - quickin
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Required purpose string: the GoogleMaps SDK references location APIs, so
        # Apple (ITMS-90683) requires this even though we only show pins, not the
        # user's location. Shown if/when location is ever requested.
        NSLocationWhenInUseUsageDescription: "QuickIn uses your location to show nearby stays and center the map."
        # Face ID: shown the first time the app evaluates biometrics to unlock a
        # saved session on the sign-in screen (LocalAuthentication). Touch ID
        # devices don't require a usage string.
        NSFaceIDUsageDescription: "Use Face ID to sign in to QuickIn faster."
        # ID verification: camera to photograph the National ID, photo library to
        # pick an existing image, and a local-networking ATS exception so the app
        # can reach the local OCR / dev server over plain HTTP.
        NSCameraUsageDescription: "QuickIn needs camera access to photograph your National ID card for verification."
        NSPhotoLibraryUsageDescription: "QuickIn needs photo library access to let you choose your National ID card image."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Declare no non-exempt encryption so TestFlight skips the export-compliance
        # prompt on every build (standard HTTPS/TLS is exempt).
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        MARKETING_VERSION: "1.0.0"
        # Build 3 was rejected for the missing location string; next upload is build 4.
        CURRENT_PROJECT_VERSION: "4"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.quickin.ahmed
        CODE_SIGN_ENTITLEMENTS: QuickIn.entitlements
        # Automatically-managed signing under the same Apple Developer team as the
        # other apps (mafeshSho8l, Droob, Bonyad, Tawazon…), so Xcode provisions
        # QuickIn with the same certificate — fixes "Profile doesn't include the
        # selected signing certificate".
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "97DNR5Y3Y5"
